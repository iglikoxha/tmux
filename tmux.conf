set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -sg escape-time 0

unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

unbind %
bind | split-window -h

unbind '"'
bind - split-window -v

unbind r
bind r source-file ~/.config/tmux/tmux.conf

bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5

bind -r m resize-pane -Z

set -g mouse on

bind C-l send-keys 'C-l'

# --- Plugins (self-contained; bootstraps on any machine, Nix or not) ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'nordtheme/tmux' # nord theme — matches the cursor-dark/Nord palette in alacritty & nvim

# Self-contained bootstrap — installs TPM + plugins on first launch, no manual
# `prefix + I` needed. Assumes the XDG config location (~/.config/tmux/tmux.conf).
#   1. point TPM at the plugin dir via TMUX_PLUGIN_MANAGER_PATH — install_plugins
#      reads this global env var and aborts if it is unset, so set it first
#   2. clone TPM if missing, then install any missing plugins
#   3. run tpm LAST so the freshly-installed plugins get sourced (theme applies)
run-shell 'DIR="$HOME/.config/tmux/plugins"; \
tmux set-environment -g TMUX_PLUGIN_MANAGER_PATH "$DIR/"; \
[ -d "$DIR/tpm" ] || git clone -q https://github.com/tmux-plugins/tpm "$DIR/tpm"; \
"$DIR/tpm/bin/install_plugins" >/dev/null 2>&1; \
"$DIR/tpm/tpm"'
